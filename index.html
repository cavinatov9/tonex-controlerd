
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ToneX</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d0d0d;--panel:#161616;--panel2:#1e1e1e;--panel3:#232323;
  --border:#252525;--border2:#303030;
  --text:#e2e2e2;--sub:#555;--sub2:#3a3a3a;
  --amp:#e06020;    /* orange — AMP */
  --cab:#e06020;    /* orange — CAB */
  --gate:#7060ff;   /* purple — NOISE GATE */
  --comp:#d040a0;   /* magenta — COMP */
  --mod:#c8a020;    /* amber/gold — MOD */
  --delay:#30b060;  /* green — DELAY */
  --reverb:#2090e0; /* blue — REVERB */
  --red:#cc3030;
}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,'Helvetica Neue',Roboto,sans-serif;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;background:none;border:none;color:inherit}
::-webkit-scrollbar{width:0;height:0}

/* ═══ HEADER ═══ */
.hdr{background:#000;border-bottom:1px solid var(--border);padding:0 14px;height:52px;display:flex;align-items:center;justify-content:space-between;gap:10px;position:sticky;top:0;z-index:300}
.hdr-left{display:flex;flex-direction:column;gap:1px;min-width:0;flex:1}
.hdr-status{display:flex;align-items:center;gap:5px}
.hdr-dot{width:7px;height:7px;border-radius:50%;background:var(--red);flex-shrink:0;transition:all .3s}
.hdr-dot.on{background:#30d060;box-shadow:0 0 6px #30d060}
.hdr-status-txt{font-size:10px;font-weight:600;letter-spacing:.06em;color:var(--sub);text-transform:uppercase;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hdr-preset{font-size:17px;font-weight:700;letter-spacing:-.2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hdr-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
#midiSel{background:#111;border:1px solid var(--border2);color:var(--text);font-size:10px;padding:5px 7px;border-radius:6px;outline:none;-webkit-appearance:none;max-width:110px}
.hdr-menu{width:30px;height:30px;border-radius:7px;background:#111;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;color:var(--sub);font-size:16px}

/* ═══ CHAIN STRIP ═══ */
.chain{background:#000;border-bottom:1px solid var(--border);display:flex;overflow-x:auto;padding:0;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory;position:sticky;top:52px;z-index:200}
.chain::-webkit-scrollbar{height:0}
.chain-item{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 14px;min-width:80px;height:56px;cursor:pointer;position:relative;flex-shrink:0;border-right:1px solid var(--border);scroll-snap-align:start;transition:background .15s;gap:3px}
.chain-item:last-child{border-right:none}
/* signal flow arrow between blocks */
.chain-item::before{content:'▸';position:absolute;right:-7px;top:50%;transform:translateY(-50%);font-size:8px;color:#2a2a2a;z-index:2;pointer-events:none}
.chain-item:last-child::before{display:none}
/* AMP anchor — left border accent so it's always visually fixed */
.chain-item[data-sec="amp"]{border-left:2px solid rgba(224,96,32,.5)}
.chain-item:active{background:#111}
.chain-item.active{background:#111}
.chain-item::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:transparent;transition:background .15s}
.chain-item.active::after{background:var(--c)}
.chain-icon{font-size:14px;line-height:1;color:var(--sub);transition:color .15s}
.chain-item.active .chain-icon{color:var(--c)}
.chain-label{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--sub);white-space:nowrap;transition:color .15s}
.chain-item.active .chain-label{color:var(--c)}
/* power LED on chain */
.chain-led{width:5px;height:5px;border-radius:50%;background:var(--sub2);position:absolute;top:7px;right:8px;transition:all .2s}
.chain-led.on{background:var(--c);box-shadow:0 0 5px var(--c)}

/* ═══ SECTION CONTENT ═══ */
.section{display:none;padding:16px 14px;min-height:calc(100dvh - 108px)}
.section.active{display:block}

/* ═══ SECTION HEADER BAR ═══ */
.sec-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;padding-bottom:10px;border-bottom:1.5px solid var(--c, #333)}
.sec-bar-left{display:flex;align-items:center;gap:10px}
.sec-bar-title{font-size:14px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
/* power button */
.pwr{width:32px;height:32px;border-radius:7px;background:var(--panel2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.pwr svg{width:15px;height:15px;stroke:var(--sub);fill:none;stroke-width:2.2;stroke-linecap:round}
.pwr.on{background:rgba(255,255,255,.06);border-color:var(--c)}
.pwr.on svg{stroke:var(--c)}
.pwr:active{transform:scale(.92)}

/* ═══ SELECT ═══ */
.sel-wrap{display:flex;flex-direction:column;gap:5px;margin-bottom:16px}
.sel-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--sub)}
.sel-box{background:#000;border-radius:8px;border:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;padding:10px 12px;position:relative;overflow:hidden}
.sel-active{border-color:var(--c)}
.sel-native{position:absolute;inset:0;opacity:0;width:100%;cursor:pointer;font-size:16px}
.sel-text{font-size:14px;font-weight:600;pointer-events:none}
.sel-chev{font-size:11px;flex-shrink:0;pointer-events:none;color:var(--c)}
/* two col selects */
.sel-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.sel-grid .sel-wrap{margin-bottom:0}

/* ═══ PRE/POST TOGGLE ═══ */
.pp-wrap{display:flex;flex-direction:column;gap:5px;margin-bottom:16px}
.pp-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--sub)}
.pp-seg{display:flex;border-radius:8px;overflow:hidden;border:1px solid var(--border2);background:#000}
.pp-active{border-color:var(--c)}
.pp-btn{flex:1;padding:10px 8px;text-align:center;font-size:12px;font-weight:700;color:var(--sub);background:transparent;border:none;font-family:inherit;cursor:pointer;letter-spacing:.05em;transition:all .15s}
.pp-btn+.pp-btn{border-left:1px solid var(--border2)}
.pp-btn.act{background:rgba(255,255,255,.07);color:var(--c)}
.pp-btn:active{opacity:.7}

/* ═══ KNOB GRID ═══ */
.kgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:10px 8px;justify-items:center;margin-top:4px}

/* ═══ KNOB ═══ */
.ctrl-unit{display:flex;flex-direction:column;align-items:center;gap:6px;touch-action:none;user-select:none;-webkit-user-select:none;width:80px;cursor:ns-resize}
.knob-wrap{width:68px;height:68px;position:relative}
.knob-body{width:68px;height:68px;border-radius:50%;background:radial-gradient(circle at 36% 32%,#2a2a2a 0%,#0f0f0f 55%,#030303 100%);box-shadow:0 4px 12px rgba(0,0,0,.9),inset 0 1px 2px rgba(255,255,255,.05)}
.knob-canvas{position:absolute;top:-8px;left:-8px;display:block;touch-action:none}
.ctrl-lbl{font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--sub);text-align:center}
.ctrl-val{font-family:'Courier New',monospace;font-size:11px;font-weight:700;text-align:center;color:var(--c, #888)}

/* ═══ AMP section special ═══ */
.amp-info{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:18px}
.amp-icon{width:36px;height:36px;border-radius:7px;border:1.5px solid var(--c);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
.amp-name{font-size:16px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.amp-lock{font-size:16px;color:var(--sub)}

/* ═══ MENU SHEET ═══ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:none;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.msheet{background:var(--panel);border:1px solid var(--border2);border-radius:20px 20px 0 0;padding:8px;width:100%;max-width:480px}
.mitem{padding:14px 16px;font-size:14px;border-bottom:1px solid var(--border);border-radius:8px;cursor:pointer}
.mitem.sub{color:var(--sub);border:none}
.mitem:active{background:var(--panel2)}

/* ═══ TOAST ═══ */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--panel);border:1px solid var(--border2);border-radius:10px;padding:9px 18px;font-size:13px;font-weight:600;opacity:0;transition:all .25s;pointer-events:none;z-index:600;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:#30d060;color:#30d060}
.toast.err{border-color:var(--red);color:var(--red)}
.toast.info{border-color:var(--mod);color:var(--mod)}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-left">
    <div class="hdr-status">
      <div class="hdr-dot" id="dot"></div>
      <div class="hdr-status-txt" id="statusText">OFFLINE</div>
    </div>
    <div class="hdr-preset" id="presetName">Init Preset</div>
  </div>
  <div class="hdr-right">
    <select id="midiSel"><option value="">Dispositivo...</option></select>
    <button class="hdr-menu" id="menuBtn">&#8942;</button>
  </div>
</div>

<!-- CHAIN STRIP -->
<div class="chain" id="chain">
  <div class="chain-item active" data-sec="gate" style="--c:var(--gate)">
    <div class="chain-led on" id="led-gate"></div>
    <div class="chain-icon">〜</div>
    <div class="chain-label">Gate</div>
  </div>
  <div class="chain-item" data-sec="amp" style="--c:var(--amp)">
    <div class="chain-icon">♬</div>
    <div class="chain-label">AMP</div>
  </div>
  <div class="chain-item" data-sec="cab" style="--c:var(--cab)">
    <div class="chain-icon">◉</div>
    <div class="chain-label">CAB</div>
  </div>
  <div class="chain-item" data-sec="comp" style="--c:var(--comp)">
    <div class="chain-led" id="led-comp"></div>
    <div class="chain-icon">⟋</div>
    <div class="chain-label">COMP</div>
  </div>
  <div class="chain-item" data-sec="mod" style="--c:var(--mod)">
    <div class="chain-led" id="led-mod"></div>
    <div class="chain-icon">∿</div>
    <div class="chain-label">MOD</div>
  </div>
  <div class="chain-item" data-sec="delay" style="--c:var(--delay)">
    <div class="chain-led" id="led-delay"></div>
    <div class="chain-icon">⏱</div>
    <div class="chain-label">DELAY</div>
  </div>
  <div class="chain-item" data-sec="reverb" style="--c:var(--reverb)">
    <div class="chain-led" id="led-reverb"></div>
    <div class="chain-icon">〾</div>
    <div class="chain-label">REVERB</div>
  </div>
</div>

<!-- SECTIONS -->

<!-- NOISE GATE -->
<div class="section active" id="sec-gate" style="--c:var(--gate)">
  <div class="sec-bar">
    <div class="sec-bar-left">
      <button class="pwr" id="pwr-14" data-cc="14" data-led="led-gate"><svg viewBox="0 0 24 24"><path d="M12 2v6"/><path d="M8.93 5.27A7 7 0 1 0 15.07 5.27"/></svg></button>
      <div class="sec-bar-title">Noise Gate</div>
    </div>
  </div>
  <div id="g-gate-pos"></div>
  <div class="kgrid" id="g-gate"></div>
</div>

<!-- AMP -->
<div class="section" id="sec-amp" style="--c:var(--amp)">
  <div class="sec-bar">
    <div class="sec-bar-left">
      <div class="sec-bar-title">Amplifier</div>
    </div>
  </div>
  <div class="amp-info">
    <div class="amp-icon">♬</div>
    <div class="amp-name">Amp Model</div>
    <div class="amp-lock">🔒</div>
  </div>
  <div class="kgrid" id="g-amp"></div>
</div>

<!-- CAB / VIR -->
<div class="section" id="sec-cab" style="--c:var(--cab)">
  <div class="sec-bar">
    <div class="sec-bar-left">
      <div class="sec-bar-title">VIR Cabinet</div>
    </div>
  </div>
  <div class="sel-grid" id="g-vir-sel"></div>
  <div class="kgrid" id="g-vir"></div>
</div>

<!-- COMP -->
<div class="section" id="sec-comp" style="--c:var(--comp)">
  <div class="sec-bar">
    <div class="sec-bar-left">
      <button class="pwr" id="pwr-18" data-cc="18" data-led="led-comp"><svg viewBox="0 0 24 24"><path d="M12 2v6"/><path d="M8.93 5.27A7 7 0 1 0 15.07 5.27"/></svg></button>
      <div class="sec-bar-title">Compressor</div>
    </div>
  </div>
  <div id="g-comp-pos"></div>
  <div class="kgrid" id="g-comp"></div>
</div>

<!-- MODULATION -->
<div class="section" id="sec-mod" style="--c:var(--mod)">
  <div class="sec-bar">
    <div class="sec-bar-left">
      <button class="pwr" id="pwr-32" data-cc="32" data-led="led-mod"><svg viewBox="0 0 24 24"><path d="M12 2v6"/><path d="M8.93 5.27A7 7 0 1 0 15.07 5.27"/></svg></button>
      <div class="sec-bar-title">Modulation</div>
    </div>
  </div>
  <div id="sec-mod-body"></div>
</div>

<!-- DELAY -->
<div class="section" id="sec-delay" style="--c:var(--delay)">
  <div class="sec-bar">
    <div class="sec-bar-left">
      <button class="pwr" id="pwr-2" data-cc="2" data-led="led-delay"><svg viewBox="0 0 24 24"><path d="M12 2v6"/><path d="M8.93 5.27A7 7 0 1 0 15.07 5.27"/></svg></button>
      <div class="sec-bar-title">Delay</div>
    </div>
  </div>
  <div id="sec-delay-body"></div>
</div>

<!-- REVERB -->
<div class="section" id="sec-reverb" style="--c:var(--reverb)">
  <div class="sec-bar">
    <div class="sec-bar-left">
      <button class="pwr" id="pwr-75" data-cc="75" data-led="led-reverb"><svg viewBox="0 0 24 24"><path d="M12 2v6"/><path d="M8.93 5.27A7 7 0 1 0 15.07 5.27"/></svg></button>
      <div class="sec-bar-title">Reverb</div>
    </div>
  </div>
  <div id="sec-reverb-body"></div>
</div>

<!-- MENU -->
<div class="overlay" id="menuSheet">
  <div class="msheet">
    <div class="mitem" id="mReset">Resetar todos os valores</div>
    <div class="mitem sub" id="mClose">Fechar</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════
var midiOut=null,midiIn=null,midiAccess=null,midiCh=0;
var knobs={},selectMap={},ppMap={};
var activeK=null;

// Section color map (CSS var name → resolved hex for canvas)
var SEC_COLORS={
  gate:'#7060ff',amp:'#e06020',cab:'#e06020',
  comp:'#d040a0',mod:'#c8a020',delay:'#30b060',reverb:'#2090e0'
};

var ccDef={
  102:64,23:64,25:64,28:64,       // AMP: gain,bass,mid,treble
  106:64,107:64,                   // presence,depth
  103:100,104:64,                  // model vol,mix
  14:127,13:0,15:64,16:64,17:64,  // gate: on,pos,thr,release,depth
  18:0,22:0,19:64,20:64,21:64,    // comp: on,pos,thr,gain,attack
  30:0,24:64,26:64,27:64,29:64,   // eq pos,bass hz,mid q,mid hz,treb hz
  109:0,112:0,                     // cab mic selects
  108:64,115:64,110:64,111:64,113:64,114:64, // cab knobs
  32:0,33:0,31:0,                  // mod: on,type,pos
  35:64,36:64,37:64,38:64,39:0,   // mod params
  2:0,3:0,4:0,5:64,6:50,8:50,     // delay: on,type,mode,time,fb,mix
  11:127,                           // delay position (POST by default)
  75:0,85:0,59:64,60:20,61:64,62:50, // reverb: on,type,time,predelay,color,mix
  63:127                            // reverb position (POST by default)
};
var ccVal={};
Object.assign(ccVal,ccDef);

// ══════════════════════════════════════════════════
// MIDI
// ══════════════════════════════════════════════════
function sendCC(cc,v){if(midiOut)midiOut.send([0xB0|midiCh,cc&127,v&127]);}
function sendPC(p){if(midiOut)midiOut.send([0xC0|midiCh,p&127]);}

function setStatus(on,lbl){
  document.getElementById('dot').className='hdr-dot'+(on?' on':'');
  document.getElementById('statusText').textContent=on?lbl:'OFFLINE';
}
function onMidiMsg(e){
  var d=e.data;if(!d||!d.length)return;
  var t=d[0]&0xF0;
  if(t===0xB0&&d.length>=3){ccVal[d[1]]=d[2];refreshControl(d[1]);}
  if(t===0xC0&&d.length>=2){
    var pc=d[1];
    document.getElementById('presetName').textContent='Preset '+(pc+1);
    showToast('Preset '+(pc+1),'info');
  }
}
function populateDevices(){
  var sel=document.getElementById('midiSel'),prev=sel.value,auto=null;
  sel.innerHTML='<option value="">Dispositivo...</option>';
  for(var[id,out]of midiAccess.outputs){
    var o=document.createElement('option');o.value=id;o.textContent=out.name;sel.appendChild(o);
    if(!auto&&(out.name.toLowerCase().includes('tonex')||id===prev))auto=id;
  }
  if(auto){sel.value=auto;pickDev(auto);}else setStatus(false,'');
  midiIn=null;
  for(var[id2,inp]of midiAccess.inputs){
    if(!midiIn||inp.name.toLowerCase().includes('tonex')){
      if(midiIn)midiIn.onmidimessage=null;midiIn=inp;inp.onmidimessage=onMidiMsg;
    }
  }
}
function pickDev(id){
  midiOut=id&&midiAccess?(midiAccess.outputs.get(id)||null):null;
  setStatus(!!midiOut,midiOut?midiOut.name.toUpperCase():'');
}
if(navigator.requestMIDIAccess){
  navigator.requestMIDIAccess({sysex:true}).then(function(a){
    midiAccess=a;populateDevices();a.onstatechange=populateDevices;
  },function(){setStatus(false,'SEM PERMISSÃO');});
}else setStatus(false,'USE CHROME');
document.getElementById('midiSel').addEventListener('change',function(e){pickDev(e.target.value);});

// ══════════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════════
var toastT=null;
function showToast(msg,type){
  var t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show '+(type||'ok');
  if(toastT)clearTimeout(toastT);
  toastT=setTimeout(function(){t.className='toast';},2200);
}

// ══════════════════════════════════════════════════
// CHAIN NAV
// ══════════════════════════════════════════════════
var curSec='gate';
document.querySelectorAll('.chain-item').forEach(function(item){
  item.addEventListener('click',function(){
    var sec=item.dataset.sec;
    document.querySelectorAll('.chain-item').forEach(function(i){i.classList.remove('active');});
    document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active');});
    item.classList.add('active');
    document.getElementById('sec-'+sec).classList.add('active');
    curSec=sec;
  });
});

// ══════════════════════════════════════════════════
// KNOB ENGINE
// ══════════════════════════════════════════════════
function drawKnob(k){
  var ctx=k.canvas.getContext('2d');
  var W=k.canvas.width,cx=W/2,cy=W/2,arcR=cx-8,bodyR=cx-16;
  ctx.clearRect(0,0,W,W);
  var pct=Math.max(0,Math.min(1,(k.val-k.min)/(k.max-k.min)));
  var sA=0.75*Math.PI,swA=1.5*Math.PI,curA=sA+pct*swA;
  // track bg
  ctx.beginPath();ctx.arc(cx,cy,arcR,sA,sA+swA);
  ctx.strokeStyle='#1c1c1c';ctx.lineWidth=6;ctx.lineCap='round';ctx.stroke();
  // progress
  if(pct>0.005){
    ctx.beginPath();ctx.arc(cx,cy,arcR,sA,curA);
    ctx.strokeStyle=k.color;ctx.lineWidth=6;ctx.lineCap='round';ctx.stroke();
  }
  // body gradient
  var g=ctx.createRadialGradient(cx-bodyR*.32,cy-bodyR*.36,0,cx,cy,bodyR);
  g.addColorStop(0,'#2a2a2a');g.addColorStop(.55,'#111');g.addColorStop(1,'#020202');
  ctx.beginPath();ctx.arc(cx,cy,bodyR,0,2*Math.PI);ctx.fillStyle=g;ctx.fill();
  // rim
  ctx.beginPath();ctx.arc(cx,cy,bodyR,1.1*Math.PI,1.9*Math.PI);
  ctx.strokeStyle='rgba(255,255,255,.05)';ctx.lineWidth=1.2;ctx.stroke();
  // indicator line (like IK style — short line from center-ish to edge)
  var iOuter=bodyR-4,iInner=bodyR*0.3;
  ctx.beginPath();
  ctx.moveTo(cx+iInner*Math.cos(curA),cy+iInner*Math.sin(curA));
  ctx.lineTo(cx+iOuter*Math.cos(curA),cy+iOuter*Math.sin(curA));
  ctx.strokeStyle=k.color;ctx.lineWidth=2.5;ctx.lineCap='round';ctx.stroke();
}
function updateKnob(k){
  drawKnob(k);
  if(k.valEl)k.valEl.textContent=(k.val/12.7).toFixed(1);
  ccVal[k.cc]=Math.round(k.val);
}
function refreshControl(cc){
  var k=knobs[cc];if(k){k.val=ccVal[cc];updateKnob(k);}
  var sm=selectMap[cc];if(sm){sm.sel.value=ccVal[cc]||0;sm.txt.textContent=sm.opts[ccVal[cc]||0]||'';}
  var pp=ppMap[cc];if(pp){
    var post=ccVal[cc]>=64;
    pp.btns[0].className='pp-btn'+((!post)?' act':'');
    pp.btns[1].className='pp-btn'+((post)?' act':'');
  }
}
window.addEventListener('mousemove',function(e){
  if(!activeK)return;
  var k=activeK.k,dy=activeK.sy-e.clientY;
  k.val=Math.max(k.min,Math.min(k.max,activeK.sv+dy*(k.max-k.min)/160));
  updateKnob(k);sendCC(k.cc,Math.round(k.val));
});
window.addEventListener('mouseup',function(){activeK=null;});

function mkKnob(parent,cc,label,color){
  delete knobs[cc];
  var unit=document.createElement('div');unit.className='ctrl-unit';
  unit.style.setProperty('--c',color);
  var wrap=document.createElement('div');wrap.className='knob-wrap';
  var body=document.createElement('div');body.className='knob-body';
  // 84×84 CSS, 168×168 resolution
  var canvas=document.createElement('canvas');
  canvas.width=168;canvas.height=168;canvas.className='knob-canvas';
  canvas.style.width='84px';canvas.style.height='84px';
  wrap.appendChild(body);wrap.appendChild(canvas);
  var lbl=document.createElement('div');lbl.className='ctrl-lbl';lbl.textContent=label;
  var vd=document.createElement('div');vd.className='ctrl-val';
  var k={cc:cc,canvas:canvas,valEl:vd,val:ccVal[cc]!==undefined?ccVal[cc]:64,min:0,max:127,color:color};
  knobs[cc]=k;updateKnob(k);
  unit.addEventListener('mousedown',function(e){e.preventDefault();activeK={k:k,sy:e.clientY,sv:k.val};});
  unit.addEventListener('touchstart',function(e){e.preventDefault();activeK={k:k,sy:e.touches[0].clientY,sv:k.val};},{passive:false});
  unit.addEventListener('touchmove',function(e){
    e.preventDefault();if(!activeK||activeK.k!==k)return;
    k.val=Math.max(k.min,Math.min(k.max,activeK.sv+(activeK.sy-e.touches[0].clientY)*127/160));
    updateKnob(k);sendCC(k.cc,Math.round(k.val));
  },{passive:false});
  unit.addEventListener('touchend',function(){activeK=null;});
  unit.addEventListener('dblclick',function(){k.val=64;updateKnob(k);sendCC(k.cc,64);});
  unit.appendChild(wrap);unit.appendChild(lbl);unit.appendChild(vd);
  parent.appendChild(unit);
}

// ══════════════════════════════════════════════════
// SELECT — raw index
// ══════════════════════════════════════════════════
function mkSelect(parent,cc,label,opts,color,onChange){
  delete selectMap[cc];
  var wrap=document.createElement('div');wrap.className='sel-wrap';
  var lbl=document.createElement('div');lbl.className='sel-lbl';lbl.textContent=label;
  var box=document.createElement('div');box.className='sel-box sel-active';
  box.style.setProperty('--c',color);
  var idx=Math.max(0,Math.min(opts.length-1,ccVal[cc]||0));
  var txt=document.createElement('span');txt.className='sel-text';txt.textContent=opts[idx]||opts[0];
  var chev=document.createElement('span');chev.className='sel-chev';chev.textContent='▾';
  var sel=document.createElement('select');sel.className='sel-native';
  opts.forEach(function(o,i){var opt=document.createElement('option');opt.value=i;opt.textContent=o;sel.appendChild(opt);});
  sel.value=idx;
  sel.addEventListener('change',function(){
    var i=parseInt(sel.value);txt.textContent=opts[i]||'';
    ccVal[cc]=i;sendCC(cc,i);if(onChange)onChange(i);
  });
  selectMap[cc]={sel:sel,txt:txt,opts:opts};
  box.appendChild(txt);box.appendChild(chev);box.appendChild(sel);
  wrap.appendChild(lbl);wrap.appendChild(box);parent.appendChild(wrap);
}

// ══════════════════════════════════════════════════
// CHAIN REORDER — moves blocks PRE/POST the AMP
// ══════════════════════════════════════════════════
// CC → section id for position-aware blocks
// CC11 = delay position, CC63 = reverb position
var POS_CC_MAP={13:'gate',22:'comp',31:'mod',11:'delay',63:'reverb'};
// Moveable blocks in their natural relative order
var MOVEABLE=['gate','comp','mod','delay','reverb'];

function reorderChain(silent){
  var chain=document.getElementById('chain');
  var items={};
  chain.querySelectorAll('.chain-item').forEach(function(el){items[el.dataset.sec]=el;});

  // position CCs: 0=PRE (<64), 127=POST (>=64)
  var posCC={gate:13,comp:22,mod:31,delay:11,reverb:63};
  var pre=[], post=[];
  MOVEABLE.forEach(function(sec){
    if(ccVal[posCC[sec]]>=64) post.push(sec); else pre.push(sec);
  });

  // Final order: [...pre] → AMP → CAB → [...post]
  var order=pre.concat(['amp','cab']).concat(post);

  order.forEach(function(sec){
    if(items[sec]) chain.appendChild(items[sec]);
  });

  chain.querySelectorAll('.chain-item').forEach(function(el,i,arr){
    el.style.borderRight= i<arr.length-1 ? '1px solid var(--border)' : 'none';
  });

  if(!silent) showToast('Cadeia atualizada','info');
}

// ══════════════════════════════════════════════════
// PRE/POST TOGGLE
// ══════════════════════════════════════════════════
function mkPP(parent,cc,label,color,labels){
  delete ppMap[cc];
  labels=labels||['PRE','POST'];
  var isPositionCC=(cc===13||cc===22||cc===31);
  var wrap=document.createElement('div');wrap.className='pp-wrap';
  var lbl=document.createElement('div');lbl.className='pp-lbl';lbl.textContent=label;
  var seg=document.createElement('div');seg.className='pp-seg pp-active';
  seg.style.setProperty('--c',color);
  var btns=[];
  labels.forEach(function(t,i){
    var btn=document.createElement('button');
    var isA=(i===0&&ccVal[cc]<64)||(i===1&&ccVal[cc]>=64);
    btn.className='pp-btn'+(isA?' act':'');
    btn.textContent=t;
    btn.style.setProperty('--c',color);
    btn.addEventListener('click',function(){
      btns.forEach(function(b){b.className='pp-btn';});
      btn.className='pp-btn act';
      var v=i===0?0:127;ccVal[cc]=v;sendCC(cc,v);
      if(isPositionCC) reorderChain();
    });
    seg.appendChild(btn);btns.push(btn);
  });
  ppMap[cc]={btns:btns,color:color};
  wrap.appendChild(lbl);wrap.appendChild(seg);parent.appendChild(wrap);
}

// ══════════════════════════════════════════════════
// POWER BUTTONS + LED sync
// ══════════════════════════════════════════════════
document.querySelectorAll('.pwr[data-cc]').forEach(function(btn){
  var cc=parseInt(btn.dataset.cc),ledId=btn.dataset.led;
  // init state
  if(ccVal[cc]>=64){btn.classList.add('on');if(ledId&&document.getElementById(ledId))document.getElementById(ledId).classList.add('on');}
  btn.addEventListener('click',function(){
    var on=btn.classList.toggle('on');
    var led=ledId?document.getElementById(ledId):null;
    if(led){if(on)led.classList.add('on');else led.classList.remove('on');}
    ccVal[cc]=on?127:0;sendCC(cc,ccVal[cc]);
  });
});

// ══════════════════════════════════════════════════
// MODULATION — dynamic per type
// ══════════════════════════════════════════════════
var MOD_DEFS=[
  {name:'Chorus', k:[{cc:35,l:'RATE'},{cc:36,l:'DEPTH'},{cc:37,l:'LEVEL'}]},
  {name:'Flanger',k:[{cc:35,l:'RATE'},{cc:36,l:'DEPTH'},{cc:38,l:'FEEDBACK'},{cc:37,l:'LEVEL'}]},
  {name:'Phaser', k:[{cc:35,l:'RATE'},{cc:36,l:'DEPTH'},{cc:37,l:'LEVEL'}]},
  {name:'Tremolo',k:[{cc:35,l:'RATE'},{cc:38,l:'SHAPE'},{cc:39,l:'SPREAD'},{cc:37,l:'LEVEL'}]},
  {name:'Rotary', k:[{cc:35,l:'SPEED'},{cc:36,l:'RADIUS'},{cc:39,l:'SPREAD'},{cc:37,l:'LEVEL'}]}
];
function buildModSection(){
  var body=G('sec-mod-body');body.innerHTML='';
  // type select
  mkSelect(body,33,'TYPE',MOD_DEFS.map(function(d){return d.name;}),C.mod,function(idx){buildModKnobs(idx);});
  // position
  mkPP(body,31,'POSITION',C.mod);
  // knob container
  var kg=document.createElement('div');kg.className='kgrid';kg.id='g-mod-knobs';
  body.appendChild(kg);
  buildModKnobs(ccVal[33]||0);
}
function buildModKnobs(ti){
  var kg=G('g-mod-knobs');if(!kg)return;kg.innerHTML='';
  var def=MOD_DEFS[ti]||MOD_DEFS[0];
  def.k.forEach(function(p){mkKnob(kg,p.cc,p.l,C.mod);});
}

// ══════════════════════════════════════════════════
// DELAY
// ══════════════════════════════════════════════════
function buildDelaySection(){
  var body=G('sec-delay-body');body.innerHTML='';
  mkSelect(body,3,'TYPE',['Digital','Tape'],C.delay);
  mkPP(body,11,'POSITION',C.delay);
  mkPP(body,4,'MODE',C.delay,['NORMAL','PING PONG']);
  var kg=document.createElement('div');kg.className='kgrid';
  mkKnob(kg,5,'TIME',C.delay);
  mkKnob(kg,6,'FEEDBACK',C.delay);
  mkKnob(kg,8,'MIX',C.delay);
  body.appendChild(kg);
}

// ══════════════════════════════════════════════════
// REVERB
// ══════════════════════════════════════════════════
function buildReverbSection(){
  var body=G('sec-reverb-body');body.innerHTML='';
  mkSelect(body,85,'TYPE',['Room','Plate','Spring 1','Spring 2','Spring 3','Spring 4'],C.reverb);
  mkPP(body,63,'POSITION',C.reverb);
  var kg=document.createElement('div');kg.className='kgrid';
  mkKnob(kg,59,'TIME',C.reverb);
  mkKnob(kg,60,'PRE DELAY',C.reverb);
  mkKnob(kg,61,'COLOR',C.reverb);
  mkKnob(kg,62,'MIX',C.reverb);
  body.appendChild(kg);
}

buildModSection();

// Apply default chain order based on default CC values
reorderChain(true);

  }
});
